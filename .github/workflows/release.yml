name: Client Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  verify-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Release summary
        run: echo "Client release validation passed for tag ${{ github.ref_name }}"
